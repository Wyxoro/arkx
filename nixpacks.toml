# ── Railway / Nixpacks build configuration ────────────────────────────────────
# Single combined service: Express API + Vite frontend served as static files.
# Domain: arkstream.org (Cloudflare-proxied)

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds   = ["npm install -g pnpm@10", "pnpm install --frozen-lockfile"]
cacheDirectories = ["node_modules", ".pnpm-store"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/arkstream run build",
  "pnpm --filter @workspace/api-server run build",
]
dependsOn = ["install"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
